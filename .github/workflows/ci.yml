name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python-version }} on ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Core (numpy) + serve (FastAPI) + dev tooling (ruff, pytest, httpx). We
      # deliberately do NOT install [onnx] here: with no embedding model the
      # chunker uses its graceful fallback, so the suite stays fast, offline,
      # and download-free. The real ONNX + tokenizers embedder path is covered
      # by the `slow`-marked tests, which run locally with `pip install .[onnx]`.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serve,dev]"

      - name: Lint (ruff)
        run: ruff check .

      # Deselect 'slow' tests: those need the downloaded embedding model.
      - name: Test (pytest)
        run: pytest -q -m "not slow"
