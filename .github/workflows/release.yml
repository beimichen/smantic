name: Release

# Cut a release by pushing a version tag that matches pyproject's version:
#   git tag v0.1.0 && git push origin v0.1.0
#
# This publishes the package to PyPI (via OIDC Trusted Publishing — no API
# token) and the FastAPI server image to GHCR. The two jobs are independent:
# if PyPI isn't configured yet, the Docker image still ships, and vice versa.
# `workflow_dispatch` allows a manual run (tags an image by branch/sha).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    # One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
    #   project: smantic · owner: beimichen · repo: smantic
    #   workflow: release.yml · environment: pypi
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for OIDC; without it publishing fails
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Publish to PyPI
        # No username/password -> OIDC Trusted Publishing.
        uses: pypa/gh-action-pypi-publish@v1.14.0

  docker:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          # On a vX.Y.Z tag: X.Y.Z, X.Y, and (auto) latest. Always a sha tag too.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build & push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
